<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}🛒 POS System{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --success: #059669;
            --success-light: #10b981;
            --danger: #dc2626;
            --warning: #f59e0b;
            --info: #0891b2;
            --bg-light: #f8fafc;
            --bg-gray: #f1f5f9;
            --text-dark: #0f172a;
            --text-gray: #64748b;
            --border-light: #e2e8f0;
            --border-gray: #cbd5e0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Header Navigation */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 0;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            font-size: 2em;
        }

        nav.main-nav {
            display: flex;
            gap: 24px;
            align-items: center;
            flex: 1;
            margin-left: 40px;
        }

        nav.main-nav a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95em;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 6px;
        }

        nav.main-nav a:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        nav.main-nav a.active {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 2em;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            color: var(--text-gray);
            font-size: 0.95em;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-light);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--border-gray);
            box-shadow: var(--shadow-md);
        }

        .card-body {
            padding: 20px;
        }

        .card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-gray);
            font-weight: 600;
            color: var(--text-dark);
        }

        .card-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-gray);
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
        }

        .product-image-wrapper {
            width: 100%;
            height: 200px;
            background: var(--bg-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border-light);
        }

        .product-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image-wrapper img {
            transform: scale(1.05);
        }

        .product-image-placeholder {
            font-size: 3.5em;
            color: #cbd5e0;
        }

        .product-info {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            display: inline-block;
            padding: 4px 10px;
            background: var(--info);
            color: white;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-bottom: 8px;
            width: fit-content;
        }

        .product-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 1.05em;
        }

        .product-price {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 8px;
        }

        .product-stock {
            font-size: 0.9em;
            color: var(--text-gray);
            margin-top: auto;
        }

        .product-stock.low {
            color: var(--warning);
            font-weight: 600;
        }

        .product-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }

        .product-link:hover {
            color: var(--primary-dark);
        }

        /* Tables */
        .table-wrapper {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--primary);
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        tbody tr:hover {
            background: var(--bg-light);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-gray);
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: var(--success);
        }

        .badge-danger {
            background: #fee2e2;
            color: var(--danger);
        }

        .badge-warning {
            background: #fef3c7;
            color: var(--warning);
        }

        .badge-info {
            background: #cffafe;
            color: var(--info);
        }

        .badge-primary {
            background: #dbeafe;
            color: var(--primary);
        }

        /* Alerts */
        .alert {
            padding: 16px 20px;
            border-radius: 8px;
            border-left: 4px solid;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-success {
            background: #f0fdf4;
            border-color: var(--success);
            color: var(--success);
        }

        .alert-danger {
            background: #fef2f2;
            border-color: var(--danger);
            color: var(--danger);
        }

        .alert-warning {
            background: #fffbeb;
            border-color: var(--warning);
            color: var(--warning);
        }

        .alert-info {
            background: #f0f9ff;
            border-color: var(--info);
            color: var(--info);
        }

        /* Summary Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary);
            margin: 12px 0;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 0.95em;
        }

        /* Utilities */
        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .text-muted {
            color: var(--text-gray);
        }

        .mt-4 {
            margin-top: 32px;
        }

        .mb-4 {
            margin-bottom: 32px;
        }

        .mb-2 {
            margin-bottom: 8px;
        }

        .flex {
            display: flex;
            align-items: center;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flex-end {
            justify-content: flex-end;
        }

        .gap-2 {
            gap: 16px;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
                gap: 16px;
            }

            nav.main-nav {
                order: 3;
                width: 100%;
                margin-left: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding-top: 12px;
                margin-top: 12px;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px 16px;
            }

            .page-title {
                font-size: 1.5em;
            }

            .btn-group {
                gap: 8px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-content">
            <div class="brand">
                <span class="brand-icon">🛒</span>
                <span>SuperPOS</span>
            </div>
            <nav class="main-nav">
                <a href="/sales/products/" {% if request.resolver_match.url_name == 'product_list' %}class="active"{% endif %}>📦 Products</a>
                <a href="/sales/orders/" {% if request.resolver_match.url_name == 'order_list' %}class="active"{% endif %}>🧾 Orders</a>
                <a href="/sales/orders/mine/" {% if request.resolver_match.url_name == 'my_orders' %}class="active"{% endif %}>👤 My Orders</a>
                <a href="/admin/" target="_blank">⚙️ Admin</a>
            </nav>
            <div class="user-menu">
                <div class="user-info">
                    <span>👤</span>
                    <span>{{ request.user.username }}</span>
                </div>
                <form method="post" action="/accounts/logout/" style="display:inline">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">Sign Out</button>
                </form>
            </div>
        </div>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
